name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + typecheck + unit + CLI integration, across the supported Node range.
  # `npm ci` installs the optional @resvg/resvg-js, so the PNG tests actually run
  # here (they self-skip only when the native rasterizer is absent).
  test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test # unit + CLI integration (vitest)

  # Regenerate the examples/ gallery each run so it always matches the current
  # renderer. The SVG output is deterministic (pure geometry + an embedded font),
  # so a drift-check on examples/svg fails if the committed gallery is stale —
  # contributors must `npm run examples` after a renderer change. (PNG bytes can
  # vary by platform's rasterizer, so they're regenerated + uploaded, not diffed.)
  examples:
    name: examples gallery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Regenerate the whole gallery (fails only if a diagram fails to render).
      - run: npm run examples
      # Surface, without failing, whether the committed gallery drifted from this
      # run — a nudge to `npm run examples` + commit after a renderer change.
      # (PNG bytes vary by the platform's rasterizer, so this is informational.)
      - name: Note if the committed gallery drifted
        run: |
          if git diff --quiet -- examples/svg examples/README.md; then
            echo "committed SVG gallery is up to date"
          else
            echo "::warning::examples/svg drifted — run 'npm run build && npm run examples' and commit to refresh the gallery"
            git --no-pager diff --stat -- examples/svg examples/README.md || true
          fi
      - name: Upload freshly regenerated gallery
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: examples-gallery
          path: examples/
          retention-days: 14

  # Playwright drives the real interactive renderer in Chromium. Kept in a
  # separate job so the (heavier) browser install runs once, on the Node floor.
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
