name: Publish

# Release by pushing a version tag (e.g. `git tag v0.5.0 && git push origin v0.5.0`).
# Requires a repo secret `NPM_TOKEN` = an npm **Automation** access token (bypasses
# 2FA). The token never touches your shell or this chat — GitHub injects it here only.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: build, test & publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance (supply-chain attestation)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      # Guard: the pushed tag must match package.json's version (v0.5.0 → 0.5.0).
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi
          echo "publishing $PKG"
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - name: Publish to npm (public, with provenance)
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
