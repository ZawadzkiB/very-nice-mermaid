<!-- very-nice-mermaid: favicon (just-the-docs injects this into <head>). A tiny
     inline SVG glyph — two nodes joined by an arrow — so no binary asset is needed. -->
<link
  rel="icon"
  type="image/svg+xml"
  href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='3' y='4' width='11' height='8' rx='2' fill='%237c8bd9'/%3E%3Crect x='18' y='20' width='11' height='8' rx='2' fill='%2339c0ed'/%3E%3Cpath d='M9 12 V17 H23 V20' fill='none' stroke='%23a0a8c0' stroke-width='2'/%3E%3Cpath d='M23 20 l-3 -4 h6 z' fill='%23a0a8c0'/%3E%3C/svg%3E"
/>

<!-- Make embedded interactive-diagram iframes fill their width and read as a card. -->
<style>
  .vnm-embed {
    width: 100%;
    height: 460px;
    border: 1px solid rgba(128, 128, 128, 0.35);
    border-radius: 10px;
    background: #0b0f1a;
  }
  .vnm-thumbs {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin: 0.75rem 0 1.5rem;
  }
  .vnm-thumbs a {
    display: block;
    border: 1px solid rgba(128, 128, 128, 0.3);
    border-radius: 8px;
    overflow: hidden;
    text-decoration: none;
  }
  .vnm-thumbs img {
    display: block;
    width: 100%;
    height: auto;
    background: #fff;
  }
  .vnm-thumbs .cap {
    display: block;
    font-size: 12px;
    padding: 4px 8px;
    opacity: 0.8;
  }
</style>
