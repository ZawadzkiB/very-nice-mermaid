<!-- very-nice-mermaid: favicon (just-the-docs injects this into <head>) — the VNM mark. -->
<link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}" />

<!-- Make embedded interactive-diagram iframes fill their width and read as a card. -->
<style>
  .vnm-embed {
    width: 100%;
    height: 460px;
    border: 1px solid rgba(128, 128, 128, 0.35);
    border-radius: 10px;
    background: #0b0f1a;
  }
  .vnm-thumbs {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin: 0.75rem 0 1.5rem;
  }
  .vnm-thumbs a {
    display: block;
    border: 1px solid rgba(128, 128, 128, 0.3);
    border-radius: 8px;
    overflow: hidden;
    text-decoration: none;
  }
  .vnm-thumbs img {
    display: block;
    width: 100%;
    height: auto;
    background: #fff;
  }
  .vnm-thumbs .cap {
    display: block;
    font-size: 12px;
    padding: 4px 8px;
    opacity: 0.8;
  }
</style>
