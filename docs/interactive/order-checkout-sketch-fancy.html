<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Order-checkout — sketch / fancy</title>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: #0b1020; font-family: 'Kalam', 'Comic Sans MS', 'Segoe Print', 'Bradley Hand', cursive; }

  button { font-family: inherit; }
</style>
</head>
